#
# application.yml — главный конфигурационный файл Spring Boot.

Что нужно сделать:
  - Указать настройки подключения к базе данных.
  - Указать порт приложения.
  - Настроить параметры безопасности и JWT.
  - Включить Swagger UI.


app:
  jwt:
    access-token-secret: ${JWT_ACCESS_SECRET:mySecretAccessKeyForJWT123!}
    refresh-token-secret: ${JWT_REFRESH_SECRET:mySecretRefreshKeyForJWT789!}
    access-token-expiration: 10m
    refresh-token-expiration: 1h
  card-encryption:
    key: ${CARD_ENCRYPTION_KEY:trainingSecretKey}